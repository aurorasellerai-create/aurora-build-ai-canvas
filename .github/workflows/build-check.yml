name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Validate imports & production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify case-sensitive filesystem (Linux)
        run: |
          echo "Running on $(uname -a)"
          echo "Filesystem is case-sensitive - matches production build environment"

      - name: Run import checker
        run: npm run check:imports

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            npm-debug.log*
            dist/
          retention-days: 7
          if-no-files-found: ignore
